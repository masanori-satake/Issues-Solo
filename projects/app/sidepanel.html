<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Issues-Solo</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="spacer"></div>
        <button id="settings-btn" title="設定" class="icon-btn">
          <svg viewBox="0 -960 960 960">
            <path
              d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-1 13.5l103 78-110 190-119-50q-11 8-23 15t-24 12L590-80H370Zm112-260q58 0 99-41t41-99q0-58-41-99t-99-41q-58 0-99 41t-41 99q0 58 41 99t99 41Zm0-80q-25 0-42.5-17.5T422-480q0-25 17.5-42.5T482-540q25 0 42.5 17.5T542-480q0 25-17.5 42.5T482-420Zm-2 40Zm-105 300h210l28-226q25-8 48-18t47-30l212 88 105-182-184-140q4-14 6-28t2-28q0-14-2-28t-6-28l184-140-105-182-212 88q-24-20-47-30t-48-18L585-880H375l-28 226q-25 8-48 18t-47 30l-212-88-105 182 184 140q-4 14-6 28t-2 28q0 14 2 28t6 28l-184 140 105 182 212-88q24 20 47 30t48 18l28 226Z"
            />
          </svg>
        </button>
      </div>
    </header>

    <main id="issue-list">
      <!-- 履歴がここに動的に生成される -->
      <div class="loading">履歴を読み込み中...</div>
    </main>

    <div id="settings-panel" class="overlay hidden">
      <div class="settings-content">
        <div class="settings-header">
          <div class="settings-title">設定</div>
          <button id="close-settings" class="icon-btn">
            <svg viewBox="0 -960 960 960">
              <path
                d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"
              />
            </svg>
          </button>
        </div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="general" title="一般">
            <svg viewBox="0 -960 960 960">
              <path
                d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-1 13.5l103 78-110 190-119-50q-11 8-23 15t-24 12L590-80H370Zm112-260q58 0 99-41t41-99q0-58-41-99t-99-41q-58 0-99 41t-41 99q0 58 41 99t99 41Zm0-80q-25 0-42.5-17.5T422-480q0-25 17.5-42.5T482-540q25 0 42.5 17.5T542-480q0 25-17.5 42.5T482-420Zm-2 40Zm-105 300h210l28-226q25-8 48-18t47-30l212 88 105-182-184-140q4-14 6-28t2-28q0-14-2-28t-6-28l184-140-105-182-212 88q-24-20-47-30t-48-18L585-880H375l-28 226q-25 8-48 18t-47 30l-212-88-105 182 184 140q-4 14-6 28t-2 28q0 14 2 28t6 28l-184 140 105 182 212-88q24 20 47 30t48 18l28 226Z"
              />
            </svg>
          </button>
          <button class="tab-btn" data-tab="projects" title="プロジェクトキー">
            <svg viewBox="0 -960 960 960">
              <path
                d="M160-120q-33 0-56.5-23.5T80-200v-360q0-33 23.5-56.5T160-640h640q33 0 56.5 23.5T880-560v360q0 33-23.5 56.5T800-120H160Zm0-80h640v-360H160v360Zm40-200h80v-80h-80v80Zm0 120h80v-80h-80v80Zm120-120h360v-80H320v80Zm0 120h360v-80H320v80ZM160-200v-360 360Zm440-520-40-80H160q-33 0-56.5 23.5T80-720v40h80v-40h320l40 80h360v40h80v-40q0-33-23.5-56.5T800-720H600Z"
              />
            </svg>
          </button>
          <button class="tab-btn" data-tab="about" title="About">
            <svg viewBox="0 -960 960 960">
              <path
                d="M440-280h80v-240h-80v240Zm40-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
              />
            </svg>
          </button>
        </div>
        <div class="tab-content" id="general-tab">
          <section id="jira-site-section">
            <h4 class="section-title">Jira サイト</h4>
            <div class="host-list-container">
              <ul id="host-list"></ul>
            </div>
            <div class="host-actions">
              <button id="add-host-btn" class="fab-btn" title="追加">
                <svg viewBox="0 -960 960 960">
                  <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                </svg>
              </button>
            </div>
          </section>

          <section id="history-section">
            <h4 class="section-title">履歴</h4>
            <div class="settings-item">
              <label for="max-history-range"
                >最大保持件数: <span id="max-history-value">50</span></label
              >
              <input
                type="range"
                id="max-history-range"
                min="0"
                max="2"
                step="1"
                value="1"
              />
              <div class="range-labels">
                <span>20</span>
                <span>50</span>
                <span>100</span>
              </div>
            </div>
            <div class="data-management">
              <div class="management-buttons">
                <button id="export-history-btn" class="management-btn">
                  <svg viewBox="0 -960 960 960">
                    <path
                      d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-520h80v520h440v80H200Zm160-240v-480 480Z"
                    />
                  </svg>
                  コピー (Export)
                </button>
                <button id="import-history-btn" class="management-btn">
                  <svg viewBox="0 -960 960 960">
                    <path
                      d="M360-200q-33 0-56.5-23.5T280-280v-480q0-33 23.5-56.5T360-840h64q11-35 43.5-57.5T540-920q40 0 72.5 22.5T656-840h64q33 0 56.5 23.5T800-760v480q0 33-23.5 56.5T720-200H360Zm0-80h360v-480h-80v120H440v-120h-80v480Zm180-560q17 0 28.5-11.5T580-880q0-17-11.5-28.5T540-920q-17 0-28.5 11.5T500-880q0 17 11.5 28.5T540-840Zm-180 560v-480 480Z"
                    />
                  </svg>
                  貼り付け (Import)
                </button>
              </div>
              <div class="import-mode-selector">
                <label>インポート設定:</label>
                <div class="radio-group">
                  <label
                    ><input type="radio" name="history-import-mode" value="add" checked />
                    追記</label
                  >
                  <label
                    ><input type="radio" name="history-import-mode" value="overwrite" />
                    上書き</label
                  >
                </div>
              </div>
              <div class="danger-zone">
                <button id="clear-history-btn" class="text-btn small danger">
                  全削除
                </button>
              </div>
            </div>
          </section>

          <section id="data-section">
            <h4 class="section-title">データ</h4>
            <div class="data-management">
              <div class="management-buttons">
                <button id="export-settings-btn" class="management-btn">
                  <svg viewBox="0 -960 960 960">
                    <path
                      d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-520h80v520h440v80H200Zm160-240v-480 480Z"
                    />
                  </svg>
                  コピー (Export)
                </button>
                <button id="import-settings-btn" class="management-btn">
                  <svg viewBox="0 -960 960 960">
                    <path
                      d="M360-200q-33 0-56.5-23.5T280-280v-480q0-33 23.5-56.5T360-840h64q11-35 43.5-57.5T540-920q40 0 72.5 22.5T656-840h64q33 0 56.5 23.5T800-760v480q0 33-23.5 56.5T720-200H360Zm0-80h360v-480h-80v120H440v-120h-80v480Zm180-560q17 0 28.5-11.5T580-880q0-17-11.5-28.5T540-920q-17 0-28.5 11.5T500-880q0 17 11.5 28.5T540-840Zm-180 560v-480 480Z"
                    />
                  </svg>
                  貼り付け (Import)
                </button>
              </div>
              <div class="import-mode-selector">
                <label>インポート設定:</label>
                <div class="radio-group">
                  <label
                    ><input type="radio" name="settings-import-mode" value="add" checked />
                    追記</label
                  >
                  <label
                    ><input type="radio" name="settings-import-mode" value="overwrite" />
                    上書き</label
                  >
                </div>
              </div>
            </div>
          </section>
        </div>
        <div class="tab-content hidden" id="projects-tab">
          <section>
            <h4 class="section-title">プロジェクト</h4>
            <div class="project-list-container">
              <ul id="project-list"></ul>
            </div>
            <div class="project-actions">
              <button id="add-project-btn" class="fab-btn" title="追加">
                <svg viewBox="0 -960 960 960">
                  <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                </svg>
              </button>
            </div>
          </section>
        </div>
        <div class="tab-content hidden" id="about-tab">
          <div class="about-container">
            <h3>Issues-Solo</h3>
            <p>Version <span id="extension-version">0.5.1</span></p>
            <p>JIRA閲覧履歴と編集状態を管理するローカル完結型Chrome拡張機能</p>
            <hr />
            <p>
              この拡張機能は、プライバシーを最優先に設計されています。すべてのデータはあなたのブラウザ内にのみ保存され、外部サーバーに送信されることはありません。
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="confirm-dialog" class="overlay hidden">
      <div class="dialog">
        <h3 id="confirm-title">確認</h3>
        <p id="confirm-message"></p>
        <div class="dialog-actions">
          <button id="confirm-cancel" class="text-btn">キャンセル</button>
          <button id="confirm-ok" class="text-btn danger">OK</button>
        </div>
      </div>
    </div>

    <div id="add-project-dialog" class="overlay hidden">
      <div class="dialog">
        <h3>プロジェクトキーの追加</h3>
        <div class="input-field">
          <label for="project-key-input">プロジェクトキー</label>
          <input type="text" id="project-key-input" placeholder="例: PROJ" />
        </div>
        <div class="dialog-actions">
          <button id="cancel-add-project" class="text-btn">キャンセル</button>
          <button id="confirm-add-project" class="text-btn">OK</button>
        </div>
      </div>
    </div>

    <div id="add-host-dialog" class="overlay hidden">
      <div class="dialog">
        <h3>Jiraホストの追加</h3>
        <div class="input-field">
          <label for="host-name">表示名</label>
          <input type="text" id="host-name" placeholder="例: 社内Jira" />
        </div>
        <div class="input-field">
          <label for="host-url">URL / ドメイン</label>
          <input type="text" id="host-url" placeholder="例: jira.example.com" />
        </div>
        <div class="dialog-actions">
          <button id="cancel-add-host" class="text-btn">キャンセル</button>
          <button id="confirm-add-host" class="text-btn">追加</button>
        </div>
      </div>
    </div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
